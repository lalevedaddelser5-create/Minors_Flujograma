<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flujograma: Acuerdos de los minors - Universidad EIA</title>
    <!-- Cargamos las librerías necesarias desde la nube -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- El tipo text/babel es fundamental para que el navegador procese el código -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState(0);
            const [selectedStep, setSelectedStep] = useState(null);

            const tabs = [
                { id: 0, title: "1. Creación y aprobación", icon: "settings" },
                { id: 1, title: "2. Matrícula y cursado", icon: "graduation-cap" },
                { id: 2, title: "3. Certificación y casos", icon: "award" }
            ];

            const ProcessStep = ({ title, responsibles, description, isDecision = false }) => (
                <div 
                    className={`relative p-4 rounded-lg border-2 transition-all cursor-pointer hover:shadow-md min-w-[220px] ${
                        isDecision ? 'border-amber-400 bg-amber-50' : 'border-blue-100 bg-white'
                    }`}
                    onClick={() => setSelectedStep({ title, responsibles, description })}
                >
                    <div className="flex flex-col gap-2">
                        {responsibles && (
                            <div className="flex gap-1 flex-wrap">
                                {responsibles.map((r, i) => (
                                    <span key={i} className="text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded-full font-medium">
                                        {r}
                                    </span>
                                ))}
                            </div>
                        )}
                        <h4 className={`text-sm font-semibold leading-tight ${isDecision ? 'text-amber-800' : 'text-slate-800'}`}>
                            {title}
                        </h4>
                    </div>
                    {isDecision && (
                        <div className="absolute -right-3 top-1/2 -translate-y-1/2 bg-white rounded-full p-0.5 border border-amber-400 shadow-sm">
                            <Icon name="help-circle" size={14} className="text-amber-500" />
                        </div>
                    )}
                </div>
            );

            const Connector = ({ label, color = "blue" }) => (
                <div className="flex flex-col items-center justify-center min-w-[50px]">
                    <div className={`h-0.5 w-full bg-${color}-200 relative`}>
                        <div className={`absolute right-0 -top-1 border-t-4 border-b-4 border-l-4 border-transparent border-l-${color}-200`} />
                    </div>
                    {label && <span className={`text-[10px] font-bold text-${color}-600 mt-1 uppercase`}>{label}</span>}
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8">
                        <h1 className="text-2xl font-bold text-slate-800 mb-2">Flujograma: Acuerdos de los minors académicos</h1>
                        <p className="text-slate-500 text-sm">Universidad EIA • Gestión Curricular</p>
                    </header>

                    <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
                        <div className="w-full md:w-64 bg-slate-900 p-4 flex flex-col gap-2">
                            {tabs.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => { setActiveTab(tab.id); setSelectedStep(null); }}
                                    className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium ${
                                        activeTab === tab.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                                    }`}
                                >
                                    <Icon name={tab.icon} size={18} />
                                    {tab.title}
                                </button>
                            ))}
                            <div className="mt-auto pt-8">
                                <div className="p-4 bg-slate-800 rounded-xl border border-slate-700 text-[11px] text-slate-400">
                                    <h5 className="text-xs font-bold text-slate-500 uppercase mb-2">Nota clave</h5>
                                    Los minors se construyen solo con asignaturas de pregrado de la EIA. No incluyen posgrado ni educación continua.
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 p-6 overflow-x-auto custom-scrollbar bg-slate-50/50">
                            {activeTab === 0 && (
                                <div className="flex flex-col gap-8 min-w-[950px] p-4">
                                    <div className="flex items-center gap-4">
                                        <ProcessStep title="Propuesta de idea" responsibles={["Proponente"]} description="El estudiante, profesor o empleado propone una idea inicial." />
                                        <Connector />
                                        <ProcessStep title="Diligenciar formulario" responsibles={["Proponente"]} description="Se presenta la propuesta formal a la institución." />
                                        <Connector />
                                        <div className="p-4 rounded-lg bg-blue-50 border border-blue-200 w-64 shadow-sm">
                                            <h4 className="text-xs font-bold text-blue-700 uppercase mb-2">Criterios curriculares</h4>
                                            <ul className="text-[10px] space-y-1 text-blue-800">
                                                <li>• Carga mínima: 9 créditos</li>
                                                <li>• Articulación gradual y coherente</li>
                                                <li>• Microcurrículos actualizados</li>
                                            </ul>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 ml-8">
                                        <Icon name="arrow-right-circle" className="text-slate-300" size={24} />
                                        <ProcessStep title="¿Cumple criterios curriculares?" isDecision description="Se verifica que la propuesta sea viable pedagógicamente." />
                                        <Connector label="Sí" color="green" />
                                        <ProcessStep title="Revisión Dirección Programa" responsibles={["Dir. Programa"]} />
                                        <Connector label="Visto Bueno" color="green" />
                                        <ProcessStep title="Viabilidad Comité Central" responsibles={["Comité Currículo"]} />
                                    </div>
                                    <div className="flex items-center gap-4 ml-16">
                                        <Icon name="arrow-right-circle" className="text-slate-300" size={24} />
                                        <ProcessStep title="¿Comité aprueba creación?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <ProcessStep title="Gestión en sistema" responsibles={["EduLAB"]} />
                                        <Connector />
                                        <div className="p-3 bg-green-600 text-white rounded-lg font-bold text-xs shadow-md">OFERTA VIGENTE</div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 1 && (
                                <div className="flex flex-col gap-8 min-w-[900px] p-4">
                                    <div className="flex items-center gap-4">
                                        <div className="px-3 py-1 bg-slate-200 rounded text-[10px] font-bold text-slate-600">INICIO</div>
                                        <ProcessStep title="Elección de minor" responsibles={["Estudiante"]} />
                                        <Connector />
                                        <ProcessStep title="¿Aplica para su programa?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <ProcessStep title="Solicitud formal" responsibles={["Dir. Programa"]} />
                                    </div>
                                    <div className="flex items-center gap-4 ml-8">
                                        <Icon name="arrow-right-circle" className="text-slate-300" size={24} />
                                        <ProcessStep title="¿Cumple prerrequisitos?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <ProcessStep title="¿Hay cupos disponibles?" isDecision />
                                        <Connector label="Sí" color="green" />
                                        <div className="p-4 bg-blue-600 text-white rounded-lg font-bold text-sm shadow-lg">CURSAR ASIGNATURAS</div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 2 && (
                                <div className="flex flex-col gap-8 p-4">
                                    <div className="flex items-center gap-4">
                                        <ProcessStep title="¿Aprueba todas las asignaturas?" isDecision responsibles={["Sistema Académico"]} />
                                        <Connector label="Sí" color="green" />
                                        <div className="flex items-center gap-4 p-5 bg-green-50 border border-green-200 rounded-xl shadow-sm">
                                            <div className="bg-green-500 p-2 rounded-lg text-white">
                                                <Icon name="award" size={24} />
                                            </div>
                                            <div>
                                                <h4 className="text-sm font-bold text-green-800">Certificado Académico</h4>
                                                <p className="text-xs text-green-600">Insignia digital otorgada automáticamente.</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-4">Casos especiales</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="p-4 bg-white border border-slate-200 rounded-xl shadow-sm">
                                            <div className="flex items-center gap-2 mb-2 text-blue-600">
                                                <Icon name="users" size={16} />
                                                <h5 className="text-xs font-bold uppercase">Egresados</h5>
                                            </div>
                                            <p className="text-[11px] text-slate-600">Hasta 2 años después de graduarse, como estudiante transitorio.</p>
                                        </div>
                                        <div className="p-4 bg-white border border-slate-200 rounded-xl shadow-sm">
                                            <div className="flex items-center gap-2 mb-2 text-rose-600">
                                                <Icon name="alert-circle" size={16} />
                                                <h5 className="text-xs font-bold uppercase">Reprobación</h5>
                                            </div>
                                            <p className="text-[11px] text-slate-600">Se puede repetir o renunciar. Si es adicional, se repite hasta aprobar.</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {selectedStep && (
                                <div className="mt-8 p-5 bg-blue-50 border-l-4 border-blue-500 rounded-r-xl animate-in fade-in slide-in-from-bottom-2">
                                    <div className="flex justify-between items-start">
                                        <h3 className="font-bold text-blue-900">{selectedStep.title}</h3>
                                        <button onClick={() => setSelectedStep(null)} className="text-blue-400 hover:text-blue-600 transition-colors">
                                            <Icon name="x-circle" size={20} />
                                        </button>
                                    </div>
                                    <p className="text-sm text-blue-800 mt-2 leading-relaxed">
                                        {selectedStep.description || "Fase del proceso según el Acuerdo de Minors de la Universidad EIA."}
                                    </p>
                                </div>
                            )}
                        </div>
                    </div>

                    <footer className="max-w-6xl mx-auto mt-8 flex flex-col md:flex-row gap-4 opacity-70">
                        <div className="flex-1 flex items-center gap-3 p-3 bg-white border rounded-lg text-[10px]">
                            <Icon name="info" size={14} className="text-blue-500" />
                            <span>Las asignaturas del minor inciden en el promedio crédito de la carrera.</span>
                        </div>
                        <div className="flex-1 flex items-center gap-3 p-3 bg-white border rounded-lg text-[10px]">
                            <Icon name="check-square" size={14} className="text-green-500" />
                            <span>Mínimo de 9 créditos académicos por minor aprobado.</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
